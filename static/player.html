<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>File Details</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        /* Always Dark Mode */
        html, body {
            margin: 0;
            background-color: #000 !important;
            color: #f1f1f1 !important;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        }
        a, button { color: inherit; }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            text-align: center;
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 0.5rem;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid #222;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            max-height: 80vh;
            display: block;
            background: #000;
        }

        /* Info */
        .info-container {
            margin-top: 1.2rem;
            background: #0f0f0f;
            padding: 1.2rem;
            border-radius: .5rem;
            border: 1px solid #222;
        }

        #file-name {
            font-size: 1.25rem;
            margin: 0;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #file-size { margin-top: .3rem; color: #aaa; }

        .hint-text {
            margin-top: 2rem;
            color: #ffc107;
            font-weight: 500;
            font-size: 1.1rem;
        }

        .actions-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .btn-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem;
            min-width: 100px;
            background-color: #222;
            border: 1px solid #444;
            border-radius: 0.5rem;
            text-decoration: none;
            color: #f1f1f1;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        
        .btn-icon:hover {
            background-color: #333;
            color: #fff;
            text-decoration: none;
        }

        .btn-icon i {
            font-size: 1.75rem;
        }

        @media (max-width: 576px) {
            .wrapper { padding: 1rem .6rem; }
            .btn-icon { min-width: 80px; padding: 0.5rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="wrapper">

        <div class="video-container">
            <video id="video-player" controls playsinline controlsList="nodownload" crossorigin="anonymous">
                <p>Your browser doesn't support HTML5 video.</p>
            </video>
        </div>

        <div class="info-container">
            <h3 id="file-name" title=""></h3>
            <p id="file-size"></p>
            
            <p class="hint-text">No sound or subtitle in video ? Try this below players</p>

            <div class="actions-container">
                <a id="vlc-btn" class="btn-icon" href="#" target="_blank">
                    <i class="bi bi-cone-striped"></i>
                    <span>VLC</span>
                </a>
                <a id="mx-player-btn" class="btn-icon" href="#" target="_blank">
                    <i class="bi bi-play-circle"></i>
                    <span>MX Player</span>
                </a>
                <a id="mx-pro-btn" class="btn-icon" href="#" target="_blank">
                    <i class="bi bi-play-circle-fill"></i>
                    <span>MX Player Pro</span>
                </a>
            </div>
        </div>

    </div>

    <script>
    (async () => {
        const rawFile = window.location.pathname.split('/').pop() || '';
        const encoded = encodeURIComponent(rawFile);
        
        const video = document.getElementById('video-player');
        const fileNameEl = document.getElementById('file-name');
        
        const streamUrl = `${location.origin}/stream/${encoded}`;
        const storageKey = `resume_pos_${rawFile}`;

        video.src = streamUrl;

        // make breakable filename (zero-width after dots)
        function makeBreakableName(name) {
            if (!name) return '';
            return name.replace(/\./g, '.\u200B');
        }

        // Resume playback logic
        video.addEventListener('loadedmetadata', () => {
            const savedTime = localStorage.getItem(storageKey);
            if (savedTime) {
                video.currentTime = parseFloat(savedTime);
            }
        });

        video.addEventListener('timeupdate', () => {
            if (video.currentTime > 0) {
                localStorage.setItem(storageKey, video.currentTime);
            }
        });

        // Auto-rotate logic for native fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock().catch(() => {});
                }
            }
        });

        // For older webkit browsers
        document.addEventListener('webkitfullscreenchange', () => {
            if (document.webkitFullscreenElement) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock().catch(() => {});
                }
            }
        });

        function setupExternalPlayerButtons() {
            document.getElementById('mx-player-btn').href = `/play/mx/${encoded}`;
            document.getElementById('mx-pro-btn').href = `/play/mxpro/${encoded}`;
            document.getElementById('vlc-btn').href = `/play/vlc/${encoded}`;
        }

        async function fetchDetails() {
            try {
                const res = await fetch(`/details/${encoded}`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const details = await res.json();

                const originalName = details.file_name || rawFile;
                const breakableName = makeBreakableName(originalName);
                fileNameEl.innerText = breakableName;
                fileNameEl.title = originalName;
                document.getElementById('file-size').innerText = details.file_size || '';
            } catch (error) {
                console.error("Failed to fetch file details:", error);
                const fallbackName = makeBreakableName(rawFile);
                fileNameEl.innerText = fallbackName;
                fileNameEl.title = rawFile;
                document.getElementById('file-size').innerText = 'Unknown size';
            }
        }

        setupExternalPlayerButtons();
        fetchDetails();
    })();
    </script>
</body>
</html>
