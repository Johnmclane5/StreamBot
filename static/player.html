<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stream Player</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- ArtPlayer JS -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>

    <style>
        html, body {
            margin: 0;
            background-color: #000 !important;
            color: #f1f1f1 !important;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container-fluid {
            max-width: 1000px;
            padding: 2rem 1rem;
            width: 100%;
        }

        .player-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            aspect-ratio: 16 / 9;
            background-color: #050505;
        }

        #artplayer {
            width: 100%;
            height: 100%;
        }

        #audio-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            z-index: 1;
            pointer-events: none;
        }

        .info-container {
            margin-top: 1.5rem;
            background: #111;
            padding: 1.5rem;
            border-radius: .75rem;
            border: 1px solid #222;
        }

        .info-container.hidden {
            display: none;
        }

        #file-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fff;
            overflow-wrap: anywhere;
        }

        #file-size {
            color: #888;
            font-size: 0.95rem;
            margin: 0;
        }

        @media (max-width: 768px) {
            .player-container { aspect-ratio: 16 / 9; }
        }
        
        @media (max-width: 576px) {
            .container-fluid { padding: 1rem 0.5rem; }
            #file-name { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="player-container">
            <img id="audio-poster" src="" alt="Poster">
            <div id="artplayer"></div>
        </div>

        <div class="info-container">
            <h3 id="file-name"></h3>
            <p id="file-size"></p>
        </div>
    </div>

    <script>
    (async () => {
        const fileLink = window.location.pathname.split('/').pop() || '';
        const encoded = encodeURIComponent(fileLink);
        const fileNameEl = document.getElementById('file-name');
        const fileSizeEl = document.getElementById('file-size');
        const audioPoster = document.getElementById('audio-poster');
        const infoContainer = document.querySelector('.info-container');
        const streamUrl = `${location.origin}/stream/${encoded}`;
        const storageKey = `playback_time_${fileLink}`;

        async function fetchDetails() {
            try {
                const res = await fetch(`/details/${encoded}`);
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                const details = await res.json();

                const fileName = details.file_title || '';
                const fileSize = details.file_artist || '';

                document.title = fileName || 'Stream Player';

                fileNameEl.innerText = fileName ? fileName : '';
                fileSizeEl.innerText = fileSize;

                // ✅ Hide info container if no data
                if (!fileName && !fileSize) {
                    infoContainer.classList.add('hidden');
                } else {
                    infoContainer.classList.remove('hidden');
                }

                if (details.mime_type && details.mime_type.startsWith('audio/') && details.poster_url) {
                    audioPoster.src = details.poster_url;
                    audioPoster.style.display = 'block';
                }

                const art = new Artplayer({
                    container: '#artplayer',
                    url: streamUrl,
                    title: fileName,
                    poster: details.poster_url || '',
                    volume: 0.7,
                    isLive: false,
                    muted: false,
                    autoplay: false,
                    pip: true,
                    autoSize: false,
                    autoMini: true,
                    screenshot: true,
                    setting: true,
                    loop: false,
                    flip: true,
                    playbackRate: true,
                    aspectRatio: true,
                    fullscreen: true,
                    fullscreenWeb: true,
                    subtitleOffset: true,
                    miniProgressBar: true,
                    mutex: true,
                    backdrop: true,
                    playsInline: true,
                    autoPlayback: true,
                    autoOrientation: true,
                    airplay: true,
                    theme: '#ff0057',
                    lang: 'en',
                    moreVideoAttr: {
                        crossOrigin: 'anonymous',
                    },
                    subtitle: details.subtitle_url ? {
                        url: details.subtitle_url,
                        type: 'srt',
                        style: {
                            color: '#fff',
                            fontSize: '20px',
                        },
                        encoding: 'utf-8',
                    } : {},
                });

                const savedTime = localStorage.getItem(storageKey);
                if (savedTime) {
                    art.on('ready', () => {
                        art.currentTime = parseFloat(savedTime);
                    });
                }

                art.on('video:timeupdate', () => {
                    const currentTime = Math.floor(art.currentTime);
                    if (currentTime % 5 === 0) {
                        localStorage.setItem(storageKey, art.currentTime);
                    }
                });

                art.on('video:pause', () => {
                    localStorage.setItem(storageKey, art.currentTime);
                });

                window.addEventListener('beforeunload', () => {
                    localStorage.setItem(storageKey, art.currentTime);
                });

            } catch (error) {
                console.error("Failed to fetch file details:", error);
                fileNameEl.innerText = "Error loading file details";
                infoContainer.classList.remove('hidden'); // show error if needed
            }
        }

        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        }, false);

        fetchDetails();
    })();
    </script>
</body>
</html>
